spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/batchdb
    username: postgres
    password: arisco2017
    driver-class-name: org.postgresql.Driver

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.springframework.batch: INFO
    br.com.exemplo.batchimport: DEBUG

app:
  batch:
    input-file: classpath:input/arquivo.csv
    chunk-size: 100

server:
  port: 8080